<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Launcher</title>

  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #111;
      color: #eee;
      overflow: hidden;
    }

    #header {
      user-select: none;
      background: #141414;
      color: #0f0;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    #controls { user-select: none; padding: 10px; }

    button {
      margin-right: 10px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #222;
      color: #eee;
      border: 1px solid #444;
    }

    button:hover {
      background: #333;
    }

    #log {
      font-family: monospace;
      padding: 12px;
      overflow-y:  scroll;
      height: calc(100vh - 230px);
      background: #141414;
      white-space: pre-wrap;
    }

    #log span {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div id="header">Full Express Server - Launcher</div>

  <div id="controls">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
    <br>
    <br>
    <button id="openVSCodeBtn">Open in VS Code</button>
  </div>
  <div id="log"></div>
  <script src="./app.js"></script>

</body>
</html>
